<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>해피로그 CMS</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; }
    /* Decap CMS 로딩 스피너 */
    .loader {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem; background: #FFF8EE; color: #2B2118;
    }
    .loader span { font-size: 1rem; color: #8A7C6D; }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#FF4F81" stroke-width="2">
      <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
    </svg>
    <span>해피로그 CMS 로딩 중...</span>
  </div>
  <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
  <script>
    document.getElementById('loader').style.display = 'none';
  </script>
</body>
</html>
